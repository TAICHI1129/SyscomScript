<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyscomScript IDE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #141720;
    --border:   #1e2330;
    --accent:   #5b8fff;
    --accent2:  #00e5a0;
    --text:     #d4daf0;
    --muted:    #5a6380;
    --error:    #ff5f6d;
    --success:  #00e5a0;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .logo span { color: var(--accent); }

  .badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: #1a2040;
    color: var(--accent);
    border: 1px solid #2a3560;
  }

  header .spacer { flex: 1; }

  .btn-run {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-run:hover { opacity: 0.85; }
  .btn-run:active { transform: scale(0.97); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-run .icon {
    width: 14px;
    height: 14px;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-left: 12px solid #fff;
    display: inline-block;
  }

  .btn-clear {
    padding: 8px 16px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    margin-right: 8px;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-clear:hover { color: var(--text); border-color: var(--muted); }

  .debug-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    margin-right: 12px;
    user-select: none;
  }
  .debug-toggle input { accent-color: var(--accent); cursor: pointer; }
  .debug-toggle:hover { color: var(--text); }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: 0;
  }

  .pane {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    min-height: 0;
  }
  .pane:last-child { border-right: none; }

  .pane-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .pane-header .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }
  .pane-header .dot.green { background: var(--accent2); }

  /* ── Editor ── */
  #editor {
    flex: 1;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.75;
    padding: 20px;
    tab-size: 4;
    caret-color: var(--accent);
  }

  /* ── Output ── */
  #output-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: var(--bg);
  }

  #output {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-all;
  }

  #output.empty { color: var(--muted); font-style: italic; }
  #output.error { color: var(--error); }
  #output.success { color: var(--text); }

  .output-line { display: block; }

  /* ── Status bar ── */
  .statusbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 6px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.running { background: var(--accent); animation: pulse 0.8s infinite; }
  .status-dot.ok      { background: var(--accent2); }
  .status-dot.err     { background: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">Syscom<span>Script</span></div>
  <div class="badge">IDE v2</div>
  <div class="spacer"></div>
  <label class="debug-toggle">
    <input type="checkbox" id="debug-check"> Show Python
  </label>
  <button class="btn-clear" onclick="clearOutput()">Clear</button>
  <button class="btn-run" id="run-btn" onclick="runCode()">
    <span class="icon"></span> Run
  </button>
</header>

<main>
  <div class="pane">
    <div class="pane-header">
      <span class="dot"></span> editor
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Write your SyscomScript here...">class Main {
    run() {
        print("Hello, World!")
    }
}</textarea>
  </div>

  <div class="pane">
    <div class="pane-header">
      <span class="dot green"></span> output
    </div>
    <div id="output-wrap">
      <div id="output" class="empty">// Run your code to see output here</div>
    </div>
  </div>
</main>

<div class="statusbar">
  <span class="status-dot" id="status-dot"></span>
  <span id="status-text">ready</span>
  <span style="flex:1"></span>
  <span id="char-count">0 chars</span>
</div>

<script>
  const editor   = document.getElementById('editor');
  const output   = document.getElementById('output');
  const runBtn   = document.getElementById('run-btn');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const charCount  = document.getElementById('char-count');

  // 文字数カウント
  editor.addEventListener('input', () => {
    charCount.textContent = editor.value.length + ' chars';
  });
  charCount.textContent = editor.value.length + ' chars';

  // Tab キーでインデント挿入
  editor.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.slice(0, s) + '    ' + editor.value.slice(s);
      editor.selectionStart = editor.selectionEnd = s + 4;
    }
    // Ctrl+Enter でも実行
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      runCode();
    }
  });

  function setStatus(state, msg) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = msg;
  }

  function clearOutput() {
    output.textContent = '// Run your code to see output here';
    output.className = 'empty';
    setStatus('', 'ready');
  }

  async function runCode() {
    const code  = editor.value;
    const debug = document.getElementById('debug-check').checked;

    if (!code.trim()) return;

    runBtn.disabled = true;
    setStatus('running', 'running...');
    output.className = '';
    output.textContent = '';

    try {
      const res = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, debug })
      });

      const data = await res.json();
      const text = data.output || '';

      if (!text.trim()) {
        output.textContent = '// (no output)';
        output.className = 'empty';
        setStatus('ok', 'done');
      } else if (text.includes('SyscomError') || text.includes('Error') || text.includes('error')) {
        output.textContent = text;
        output.className = 'error';
        setStatus('err', 'error');
      } else {
        output.textContent = text;
        output.className = 'success';
        setStatus('ok', 'done');
      }

    } catch (err) {
      output.textContent = 'Error: This is the GitHub Pages version.\nPlease refer to the README of the GitHub repository and start SCS IDE using the correct procedure.';
      output.className = 'error';
      setStatus('err', 'connection error');
    } finally {
      runBtn.disabled = false;
    }
  }
</script>
</body>
</html>
